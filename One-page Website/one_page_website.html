<!DOCTYPE html>
<html>
<head>
<title>Travel Adventures</title>
</head>
<body>

<!-- Navigation -->
<nav>
<a href="#home">Home</a> |
<a href="#gallery">Gallery</a> |
<a href="#video">Video</a> |
<a href="#contact">Contact</a>
</nav>

<hr>

<!-- Home Section -->
<section id="home">
<h1>Welcome to My Travel Website</h1>
<p>This one-page site showcases my favorite travel destinations.</p>
</section>

<hr>

<!-- Image Section -->
<section id="gallery">
<h2>Travel Gallery</h2>
<img class="gallery-img" src="https://picsum.photos/300/200" onclick="openModal();currentSlide(1)">
<img class="gallery-img" src="https://picsum.photos/300/201" onclick="openModal();currentSlide(2)">
<img class="gallery-img" src="https://picsum.photos/300/202" onclick="openModal();currentSlide(3)">
</section>

<hr>

<!-- Video Section -->
<section id="video">
<h2>Travel Video</h2>
<iframe width="560" height="315"
src="https://www.youtube.com/embed/tgbNymZ7vqY"
title="Travel Video"
frameborder="0"
allowfullscreen>
</iframe>
</section>

<hr>

<!-- Contact Section -->
<section id="contact">
<h2>Contact Me</h2>
<form>
<label>Name:</label><br>
<input type="text"><br><br>

<label>Email:</label><br>
<input type="email"><br><br>

<label>Message:</label><br>
<textarea></textarea><br><br>

<input type="submit" value="Submit">
</form>
</section>

<hr>

<!-- Footer -->
<footer>
<p>© 2026 Travel Adventures</p>
</footer>

<div id="myModal" class="modal">

  <span class="close cursor" onclick="closeModal()">&times;</span>

  <button onclick="plusSlides(-1)">Previous</button>

  <img class="lightbox-img" src="https://picsum.photos/800/400?1">
  <img class="lightbox-img" src="https://picsum.photos/800/400?2">
  <img class="lightbox-img" src="https://picsum.photos/800/400?3">

  <button onclick="plusSlides(1)">Next</button>
</div>

<script src="JS/one_page_website.js"></script>

</body>
</html>

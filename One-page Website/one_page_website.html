<!DOCTYPE html>
<html>
<head>
<title>Travel Adventures</title>
</head>
<body>

<!-- Navigation -->
<nav>
<a href="#home">Home</a> |
<a href="#gallery">Gallery</a> |
<a href="#video">Video</a> |
<a href="#contact">Contact</a>
</nav>

<hr>

<!-- Home Section -->
<section id="home">
<h1>Welcome to My Travel Website</h1>
<p>This one-page site showcases my favorite travel destinations.</p>
</section>

<hr>

<!-- Image Section -->
<section id="gallery">
<h2>Travel Gallery</h2>
<img src="https://picsum.photos/300/200" alt="Travel Photo 1" onclick="openModal(); document.getElementById('modalImg').src=this.src;">
<img src="https://picsum.photos/300/201" alt="Travel Photo 2" onclick="openModal(); document.getElementById('modalImg').src=this.src;">
<img src="https://picsum.photos/300/202" alt="Travel Photo 3" onclick="openModal(); document.getElementById('modalImg').src=this.src;">
</section>

<hr>

<!-- Video Section -->
<section id="video">
<h2>Travel Video</h2>
<iframe width="560" height="315"
src="https://www.youtube.com/embed/tgbNymZ7vqY"
title="Travel Video"
frameborder="0"
allowfullscreen>
</iframe>
</section>

<hr>

<!-- Contact Section -->
<section id="contact">
<h2>Contact Me</h2>
<form>
<label>Name:</label><br>
<input type="text"><br><br>

<label>Email:</label><br>
<input type="email"><br><br>

<label>Message:</label><br>
<textarea></textarea><br><br>

<input type="submit" value="Submit">
</form>
</section>

<hr>

<!-- Footer -->
<footer>
<p>© 2026 Travel Adventures</p>
</footer>

<div id="myModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black;">
  <span onclick="closeModal()" style="color:white; font-size:30px; cursor:pointer;">&times;</span>
  <img id="modalImg" style="display:block; margin:60px auto; max-width:90%; max-height:80%;">
</div>

<script src="JS/one_page_website.js"></script>

</body>
</html>

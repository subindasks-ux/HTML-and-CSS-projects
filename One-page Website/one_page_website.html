<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lightbox Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Photo Gallery</h1>
<p>Click any image to open the slideshow.</p>

<section class="gallery-grid">
<img src="https://picsum.photos/id/1015/500/300" alt="Forest view" class="thumb" onclick="openViewer(1)">
<img src="https://picsum.photos/id/1016/500/300" alt="Mountain lake" class="thumb" onclick="openViewer(2)">
<img src="https://picsum.photos/id/1018/500/300" alt="River landscape" class="thumb" onclick="openViewer(3)">
<img src="https://picsum.photos/id/1020/500/300" alt="Road trip" class="thumb" onclick="openViewer(4)">
</section>

<div id="galleryModal" class="viewer">
<span class="close-btn" onclick="closeViewer()">&times;</span>

<div class="viewer-box">

<div class="slide">
<div class="slide-count">1 / 4</div>
<img src="https://picsum.photos/id/1015/1000/600" alt="Forest view large" class="big-image">
</div>

<div class="slide">
<div class="slide-count">2 / 4</div>
<img src="https://picsum.photos/id/1016/1000/600" alt="Mountain lake large" class="big-image">
</div>

<div class="slide">
<div class="slide-count">3 / 4</div>
<img src="https://picsum.photos/id/1018/1000/600" alt="River landscape large" class="big-image">
</div>

<div class="slide">
<div class="slide-count">4 / 4</div>
<img src="https://picsum.photos/id/1020/1000/600" alt="Road trip large" class="big-image">
</div>

<a class="back" onclick="moveSlide(-1)">&#10094;</a>
<a class="forward" onclick="moveSlide(1)">&#10095;</a>

<div class="caption-area">
<p id="imageCaption"></p>
</div>

<div class="thumb-row">
<img class="small-thumb" src="https://picsum.photos/id/1015/200/120" alt="Forest view" onclick="showSlide(1)">
<img class="small-thumb" src="https://picsum.photos/id/1016/200/120" alt="Mountain lake" onclick="showSlide(2)">
<img class="small-thumb" src="https://picsum.photos/id/1018/200/120" alt="River landscape" onclick="showSlide(3)">
<img class="small-thumb" src="https://picsum.photos/id/1020/200/120" alt="Road trip" onclick="showSlide(4)">
</div>

</div>
</div>

<h2>Watch My Video</h2>

<div class="video-container">
<iframe width="560" height="315"
src="https://www.youtube.com/embed/tgbNymZ7vqY"
title="YouTube video player"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
</div>

<script src="JS/script.js"></script>
</body>
</html>
